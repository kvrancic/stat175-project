# Ablation: rerun on synthetic graphs matched in size/density to the average campus.
# Confirms the policy ranking is not an artifact of Facebook-specific topology.
seed: 42
synthetic:
  variants: [er, ba, ws, config, sbm]
  template_campus: Caltech36

sis:
  R0_grid: [3.0]
  n_realizations: 20         # reduced from 50 for tractable local runtime; cluster re-run should restore 50
  n_steps: 100               # reduced from default 200; cluster re-run should restore 200
budget_fractions: [0.0, 0.01, 0.05, 0.10, 0.20]
