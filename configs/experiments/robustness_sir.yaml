# Robustness panel 2: SIR alternative epidemic model.
# Same policies, same campuses; swap SIS for SIR.
seed: 42

sir:
  R0_grid: [1.5, 3.0]
  n_realizations: 20         # reduced from 50 for tractable local runtime; cluster re-run should restore 50
  n_steps: 150               # reduced from default 300 for tractable local runtime; cluster re-run should restore 300
budget_fractions: [0.0, 0.01, 0.05, 0.10, 0.20]
